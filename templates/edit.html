{% extends "base.html" %}

{% block title %}Modifier produit{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('produit.index') }}" class="inline-flex items-center text-sm font-medium text-muted-foreground hover:text-foreground mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Retour à la liste
        </a>
        <h2 class="text-2xl font-bold tracking-tight">Modifier le produit</h2>
        <p class="text-sm text-muted-foreground">Mettez à jour les informations du produit #{{ produit.id }}.</p>
    </div>

    <div class="rounded-xl border border-gray-200 bg-white shadow-sm">
        <form action="{{ url_for('produit.update', produit_id=produit.id) }}" method="POST" class="p-6 space-y-6">
            <div class="space-y-2">
                <label for="nom" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Nom <span class="text-red-500">*</span></label>
                <input type="text" id="nom" name="nom" value="{{ produit.nom }}" required
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
            </div>
            
            <div class="space-y-2">
                <label for="description" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Description</label>
                <textarea id="description" name="description" rows="4"
                    class="flex min-h-[80px] w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">{{ produit.description or '' }}</textarea>
            </div>
            
            <div class="space-y-2">
                <label for="prix" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Prix (Ar) <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-muted-foreground">
                        <i data-lucide="coins" class="w-4 h-4"></i>
                    </div>
                    <input type="number" id="prix" name="prix" step="0.01" min="0" value="{{ produit.prix }}" required
                        class="flex h-10 w-full rounded-md border border-input bg-background pl-10 pr-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
                </div>
            </div>
            
            <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                <a href="{{ url_for('produit.index') }}" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-gray-100 h-10 px-4 py-2">
                    Annuler
                </a>
                <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2">
                    Mettre à jour
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
