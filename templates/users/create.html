{% extends "base.html" %}

{% block title %}Nouvel utilisateur{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('user.index') }}" class="inline-flex items-center text-sm font-medium text-muted-foreground hover:text-foreground mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Retour à la liste
        </a>
        <h2 class="text-2xl font-bold tracking-tight">Nouvel utilisateur</h2>
        <p class="text-sm text-muted-foreground">Créez un compte pour un nouvel utilisateur.</p>
    </div>

    <div class="rounded-xl border border-gray-200 bg-white shadow-sm">
        <form action="{{ url_for('user.create') }}" method="POST" class="p-6 space-y-6">
            <div class="space-y-2">
                <label for="username" class="text-sm font-medium leading-none">Nom d'utilisateur <span class="text-red-500">*</span></label>
                <input type="text" id="username" name="username" required
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2" 
                    placeholder="johndoe">
            </div>
            
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium leading-none">Email <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-muted-foreground">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </div>
                    <input type="email" id="email" name="email" required
                        class="flex h-10 w-full rounded-md border border-input bg-background pl-10 pr-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
                        placeholder="john@example.com">
                </div>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-medium leading-none">Mot de passe <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-muted-foreground">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="flex h-10 w-full rounded-md border border-input bg-background pl-10 pr-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
                </div>
            </div>

            <div class="space-y-2">
                <label for="role" class="text-sm font-medium leading-none">Rôle</label>
                <select id="role" name="role"
                    class="flex h-10 w-full items-center justify-between rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
                    <option value="user">Utilisateur (User)</option>
                    <option value="agent">Agent</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            
            <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                <a href="{{ url_for('user.index') }}" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background border border-input bg-background hover:bg-gray-100 h-10 px-4 py-2">
                    Annuler
                </a>
                <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
